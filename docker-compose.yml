version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: fitbit-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sleep_score_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
      
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fitbit-fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://user:password@mysql:3306/sleep_score_db?charset=utf8mb4
      PYTHONPATH: /app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tests_artifacts:/app/tests_artifacts

